name: Build APK V5

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: android-actions/setup-android@v3

      - run: npm install -g @bubblewrap/cli

      - run: |
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=MiniChatGPT, OU=Dev, O=MiniChatGPT, L=Paris, S=France, C=FR"

      - run: |
          bubblewrap init \
            --manifest-url=https://TON-USER.github.io/mini-chatgpt/manifest.json \
            --directory=android

      - run: |
          cd android && bubblewrap build

      - run: |
          cd android
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore ../release.keystore -storepass android -keypass android \
            app-release-unsigned.apk release
          zipalign -v 4 app-release-unsigned.apk app-release-signed.apk

      - uses: actions/upload-artifact@v4
        with:
          name: MiniChatGPT-V5-APK
          path: android/app-release-signed.apk

      - if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app-release-signed.apk
          body: |
            ## 🤖 Mini ChatGPT V5.0 — 20 IA
            
            ### 🆕 Nouveautés V5
            - 🧠 Architecture 20 IA
            - 🖼️ Recherche et affichage d'images
            - 📝 Paragraphes professionnels
            - 🌐 Recherche web + images
            - 🎨 Interface améliorée
            
            ### 📱 Installation
            Téléchargez l'APK ci-dessous.
