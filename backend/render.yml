services:
  - type: web
    name: mini-chatgpt-api-v5
    env: node
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://TON-USER.github.io/mini-chatgpt
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: DATABASE_URL
        fromDatabase:
          name: mini-chatgpt-db-v5
          property: connectionString

databases:
  - name: mini-chatgpt-db-v5
    databaseName: minichatgpt_v5
    plan: free
